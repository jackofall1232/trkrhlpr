name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Assemble, test, and lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ORS_API_KEY is an optional repository secret; when unset the build
      # falls back to an empty key and the app shows its not-configured state.
      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}

      - name: Unit tests and lint
        run: ./gradlew check --stacktrace
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}

      # Debug-signed APK for sideload/beta distribution; a human still uploads
      # it to a GitHub Release — CI never publishes anything itself. Runs after
      # check so a red run never exposes a plausible release candidate.
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: lastwagon-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            core/data/schemas/**
          if-no-files-found: ignore
          retention-days: 7
